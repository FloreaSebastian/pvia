name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      E2E_BASE_URL: http://localhost:8080
      E2E_PORT: "8080"
      # Comptes test (à définir dans GitHub → Settings → Secrets and variables → Actions)
      E2E_DIRECTEUR_EMAIL: ${{ secrets.E2E_DIRECTEUR_EMAIL }}
      E2E_DIRECTEUR_PASSWORD: ${{ secrets.E2E_DIRECTEUR_PASSWORD }}
      E2E_RESPONSABLE_EMAIL: ${{ secrets.E2E_RESPONSABLE_EMAIL }}
      E2E_RESPONSABLE_PASSWORD: ${{ secrets.E2E_RESPONSABLE_PASSWORD }}
      E2E_CONDUCTEUR_EMAIL: ${{ secrets.E2E_CONDUCTEUR_EMAIL }}
      E2E_CONDUCTEUR_PASSWORD: ${{ secrets.E2E_CONDUCTEUR_PASSWORD }}
      E2E_TECHNICIEN_EMAIL: ${{ secrets.E2E_TECHNICIEN_EMAIL }}
      E2E_TECHNICIEN_PASSWORD: ${{ secrets.E2E_TECHNICIEN_PASSWORD }}
      E2E_ASSISTANT_EMAIL: ${{ secrets.E2E_ASSISTANT_EMAIL }}
      E2E_ASSISTANT_PASSWORD: ${{ secrets.E2E_ASSISTANT_PASSWORD }}
      # Backend (publishable, non sensible) — surchargez via secrets si besoin
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start dev server
        run: bun run dev &
        env:
          PORT: "8080"

      - name: Wait for dev server
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080 >/dev/null 2>&1; then
              echo "Dev server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Dev server failed to start" >&2
          exit 1

      - name: Run Playwright E2E
        run: bun run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces & screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
